<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민지의 이사일기</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:'Pretendard', sans-serif;
    background:black;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* 시작화면 */
#startScene{
    width:100%;
    height:100%;
    background:url('GameStart.png') center/cover no-repeat;
    position:absolute;
    z-index:100;
    cursor:pointer;
}

/* 걷는 화면 */
#walkScene{
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    position:absolute;
    z-index:90;
}

.walkText{
    color:white;
    font-size:60px;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%{opacity:0.3;}
    50%{opacity:1;}
    100%{opacity:0.3;}
}

/* 불타는 집 */
#fireScene{
    width:100%;
    height:100%;
    background:url('불타는집.jpg') center/cover no-repeat;
    position:absolute;
    opacity:0;
    transition:3s;
}

/* 어둡게 */
#darkOverlay{
    width:100%;
    height:100%;
    background:black;
    position:absolute;
    opacity:1;
    transition:4s;
    z-index:2;
}

/* 대사 */
#dialogueBox{
    width:80%;
    min-height:160px;
    background:rgba(0,0,0,0.75);
    border:4px solid white;
    border-radius:20px;
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    padding:25px;
    display:none;
    z-index:50;
    color:white;
    cursor:pointer;
}

#speaker{
    color:#ffd166;
    font-size:24px;
    margin-bottom:10px;
    font-weight:bold;
}

#dialogueText{
    font-size:34px;
    line-height:1.5;
}

#next{
    position:absolute;
    right:20px;
    bottom:15px;
    font-size:24px;
    animation:blink 1s infinite;
}

/* 휴대폰 */
#phoneScene{
    width:100%;
    height:100%;
    background:black;
    position:absolute;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:70;
}

#phoneScene img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* 앱 */
#appScene{
    width:100%;
    height:100%;
    background:#f4f4f4;
    position:absolute;
    display:none;
    overflow:auto;
    z-index:80;
}

#header{
    width:100%;
    padding:30px;
    background:#ff8a00;
    color:white;
    font-size:42px;
    font-weight:bold;
}

#roomContainer{
    display:flex;
    gap:40px;
    padding:40px;
}

/* 매물 */
.roomCard{
    width:420px;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
    cursor:pointer;
    transition:0.3s;
}

.roomCard:hover{
    transform:translateY(-10px);
}

.roomImg{
    height:250px;
    background-size:cover;
    background-position:center;
}

.roomInfo{
    padding:25px;
}

.roomInfo h2{
    margin-bottom:15px;
}

.roomInfo p{
    margin:10px 0;
    font-size:20px;
}

/* 상세 */
#detailScene{
    width:100%;
    height:100%;
    background:#f5f5f5;
    position:absolute;
    z-index:200;
    display:none;
    overflow:auto;
    padding:40px;
}

.detailCard{
    max-width:1000px;
    margin:auto;
    background:white;
    border-radius:25px;
    padding:40px;
}

.detailCard h1{
    margin-bottom:20px;
}

.detailCard p{
    margin:15px 0;
    line-height:1.8;
    font-size:22px;
}

.backBtn{
    padding:15px 30px;
    border:none;
    border-radius:15px;
    background:black;
    color:white;
    font-size:20px;
    cursor:pointer;
    margin-bottom:20px;
}

.scheduleBtn{
    margin-top:30px;
    padding:20px 40px;
    border:none;
    border-radius:15px;
    background:#ff8a00;
    color:white;
    font-size:24px;
    cursor:pointer;
}

.contractPaper{
    margin-top:40px;
    padding:35px;
    border:2px solid #ddd;
    border-radius:20px;
}

/* 단어 설명 */
.term{
    color:#ff5c00;
    font-weight:bold;
    cursor:pointer;
    position:relative;
}

.term:hover::after{
    content:attr(data-tip);
    position:absolute;
    top:-70px;
    left:0;
    width:320px;
    background:black;
    color:white;
    padding:12px;
    border-radius:10px;
    font-size:16px;
}

/* 엔딩 */
#endingScene{
    width:100%;
    height:100%;
    background:black;
    position:absolute;
    display:none;
    justify-content:center;
    align-items:center;
    padding:80px;
    z-index:500;
}

#endingText{
    color:white;
    font-size:40px;
    line-height:1.8;
    text-align:center;
    max-width:1200px;
}
</style>
</head>
<body>

<div id="game">

    <!-- 시작 -->
    <div id="startScene"></div>

    <!-- 걷기 -->
    <div id="walkScene">
        <div class="walkText">(터벅... 터벅...)</div>
    </div>

    <!-- 불타는 집 -->
    <div id="fireScene"></div>

    <div id="darkOverlay"></div>

    <!-- 대사 -->
    <div id="dialogueBox">
        <div id="speaker">민지</div>
        <div id="dialogueText"></div>
        <div id="next">▶▶</div>
    </div>

    <!-- 휴대폰 -->
    <div id="phoneScene">
        <img src="직방키기.png">
    </div>

    <!-- 직방 앱 -->
    <div id="appScene">

        <div id="header">직방</div>

        <div id="roomContainer">

            <!-- 매물1 -->
            <div class="roomCard" onclick="openRoom(1)">

                <div class="roomImg"
                style="background-image:url('https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?q=80&w=1200&auto=format&fit=crop');">
                </div>

                <div class="roomInfo">
                    <h2>신축 오피스텔</h2>
                    <p>전세 500만원</p>
                    <p>관리비 별도</p>
                    <p>즉시 입주 가능</p>
                </div>

            </div>

            <!-- 매물2 -->
            <div class="roomCard" onclick="openRoom(2)">

                <div class="roomImg"
                style="background-image:url('https://images.unsplash.com/photo-1494526585095-c41746248156?q=80&w=1200&auto=format&fit=crop');">
                </div>

                <div class="roomInfo">
                    <h2>역세권 원룸</h2>
                    <p>보증금 1000 / 월세 45</p>
                    <p>관리비 8만원</p>
                    <p>전입신고 가능</p>
                </div>

            </div>

        </div>

    </div>

    <!-- 상세 -->
    <div id="detailScene">
        <button class="backBtn" onclick="closeDetail()">← 돌아가기</button>
        <div id="detailContent"></div>
    </div>

    <!-- 엔딩 -->
    <div id="endingScene">
        <div id="endingText"></div>
    </div>

</div>

<script>
const startScene = document.getElementById("startScene");
const walkScene = document.getElementById("walkScene");
const fireScene = document.getElementById("fireScene");
const darkOverlay = document.getElementById("darkOverlay");

const dialogueBox = document.getElementById("dialogueBox");
const dialogueText = document.getElementById("dialogueText");

const phoneScene = document.getElementById("phoneScene");
const appScene = document.getElementById("appScene");

darkOverlay.style.display = "none";

const dialogues = [
"뭐야...? 우리 집이 불타고 있잖아?!",
"잠깐만... 지금 당장 잘 곳부터 구해야 해...",
"보증금도 얼마 없는데 어떡하지...?",
"일단 직방부터 켜보자..."
];

let current = 0;

/* 시작 */
startScene.addEventListener("click", ()=>{

    startScene.style.display = "none";

    walkScene.style.display = "flex";

    setTimeout(()=>{

        walkScene.style.display = "none";

        fireScene.style.opacity = "1";

        darkOverlay.style.display = "block";

        setTimeout(()=>{
            darkOverlay.style.opacity = "0";
        },100);

    },3000);

    setTimeout(()=>{

        dialogueBox.style.display = "block";
        dialogueText.innerText = dialogues[current];

    },6500);

});

/* 대사 넘기기 */
dialogueBox.addEventListener("click", ()=>{

    current++;

    if(current < dialogues.length){

        dialogueText.innerText = dialogues[current];

    }else{

        dialogueBox.style.display = "none";

        phoneScene.style.display = "flex";

        setTimeout(()=>{

            appScene.style.display = "block";

            dialogueBox.style.display = "block";

            dialogueText.innerText =
            "매물이 두 개밖에 없네... 난 가진 돈도 얼마 없는데... 어떻게 해야 하지...?";

        },2500);

    }

});

/* 앱 자유롭게 보기 */
appScene.addEventListener("click", ()=>{

    dialogueBox.style.display = "none";

});

/* 상세 */
const detailScene = document.getElementById("detailScene");
const detailContent = document.getElementById("detailContent");

function openRoom(type){

detailScene.style.display = "block";

if(type === 1){

detailContent.innerHTML = `

<div class="detailCard">

<h1>신축 오피스텔</h1>

<p>
“오늘 계약 안 하면 바로 나가요.”
</p>

<p>
전세금은 500만원.
시세보다 저렴해 보였다.
</p>

<p>
계약 전
<span class="term"
data-tip="건물의 실제 소유자와 대출 여부를 확인할 수 있는 서류">
등기부등본
</span>
확인이 필요하다고 적혀 있었다.
</p>

<button class="scheduleBtn" onclick="showContract(1)">
일정 잡기
</button>

</div>

`;

}else{

detailContent.innerHTML = `

<div class="detailCard">

<h1>역세권 원룸</h1>

<p>
집주인은 민지에게 천천히 둘러보라고 말했다.
</p>

<p>
보증금은 1000만원,
월세는 45만원이었다.
</p>

<p>
계약 전
<span class="term"
data-tip="세입자가 해당 주소에 실제 거주한다고 등록하는 절차">
전입신고
</span>
가능 여부와
<span class="term"
data-tip="보증금을 우선적으로 돌려받을 권리">
확정일자
</span>
설명이 포함되어 있었다.
</p>

<button class="scheduleBtn" onclick="showContract(2)">
일정 잡기
</button>

</div>

`;

}

}

function closeDetail(){
detailScene.style.display = "none";
}

/* 계약서 */
function showContract(type){

if(type === 1){

detailContent.innerHTML = `

<div class="detailCard">

<h1>임대차 계약서</h1>

<div class="contractPaper">

<p>
<span class="term"
data-tip="세입자가 집주인에게 맡기는 큰 금액">
보증금
</span>
: 500만원
</p>

<p>
월세 없음
</p>

<p>
건물 담보 대출 있음
</p>

<p>
계약 당일 전액 입금 요청
</p>

<p>
집주인 연락처 추후 제공
</p>

</div>

<button class="scheduleBtn"
onclick="badEnding()">
계약하기
</button>

<button class="scheduleBtn"
style="background:#777"
onclick="closeDetail()">
고민해볼게요
</button>

</div>

`;

}else{

detailContent.innerHTML = `

<div class="detailCard">

<h1>임대차 계약서</h1>

<div class="contractPaper">

<p>
<span class="term"
data-tip="세입자가 집주인에게 맡기는 큰 금액">
보증금
</span>
: 1000만원
</p>

<p>
월세 : 45만원
</p>

<p>
<span class="term"
data-tip="세입자가 실제 거주한다고 신고하는 절차">
전입신고
</span>
가능
</p>

<p>
<span class="term"
data-tip="보증금을 우선적으로 돌려받을 권리">
확정일자
</span>
가능
</p>

<p>
관리비 포함 항목 명시
</p>

</div>

<button class="scheduleBtn"
onclick="goodEnding()">
계약하기
</button>

<button class="scheduleBtn"
style="background:#777"
onclick="closeDetail()">
고민해볼게요
</button>

</div>

`;

}

}

/* 엔딩 */
const endingScene = document.getElementById("endingScene");
const endingText = document.getElementById("endingText");

function badEnding(){

endingScene.style.display = "flex";

endingText.innerHTML = `

계약 후 며칠 뒤.

민지는 집주인에게 연락을 시도했지만
전화는 이미 없는 번호였다.

뒤늦게 확인한 결과,
해당 건물은 대출 문제가 있었고
민지는 보증금을 돌려받지 못했다.

<br><br>

- 연락두절 엔딩 -

`;

}

function goodEnding(){

endingScene.style.display = "flex";

endingText.innerHTML = `

민지는 계약 전 내용을 꼼꼼히 확인했다.

전입신고와 확정일자까지 완료한 후
안전하게 새로운 집으로 이사할 수 있었다.

처음엔 어렵고 낯설었지만,
이번 경험을 통해
계약 전 확인의 중요성을 배우게 되었다.

<br><br>

- 새로운 시작 엔딩 -

`;

}
</script>

</body>
</html>
