<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>민지의 이사일기</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    overflow:hidden;
    font-family:'Pretendard', sans-serif;
    background:black;
}

#game{
    width:100vw;
    height:100vh;
    position:relative;
    overflow:hidden;
}

/* 시작화면 */
#startScene{
    width:100%;
    height:100%;
    background:url('GameStart.png') center/cover no-repeat;
    position:absolute;
    z-index:100;
    cursor:pointer;
}

/* 걷는 화면 */
#walkScene{
    width:100%;
    height:100%;
    background:black;
    display:none;
    justify-content:center;
    align-items:center;
    position:absolute;
    z-index:90;
}

.walkText{
    color:white;
    font-size:60px;
    animation:blink 1s infinite;
}

@keyframes blink{
    0%{opacity:0.3;}
    50%{opacity:1;}
    100%{opacity:0.3;}
}

/* 불타는 집 */
#fireScene{
    width:100%;
    height:100%;
    background:url('불타는집.jpg') center/cover no-repeat;
    position:absolute;
    opacity:0;
    transition:3s;
}

/* 어둡게 */
#darkOverlay{
    width:100%;
    height:100%;
    background:black;
    position:absolute;
    opacity:1;
    transition:4s;
    z-index:2;
}

/* 대사 */
#dialogueBox{
    width:80%;
    min-height:160px;
    background:rgba(0,0,0,0.75);
    border:4px solid white;
    border-radius:20px;
    position:absolute;
    bottom:30px;
    left:50%;
    transform:translateX(-50%);
    padding:25px;
    display:none;
    z-index:50;
    color:white;
    cursor:pointer;
}

#speaker{
    color:#ffd166;
    font-size:24px;
    margin-bottom:10px;
    font-weight:bold;
}

#dialogueText{
    font-size:34px;
    line-height:1.5;
}

#next{
    position:absolute;
    right:20px;
    bottom:15px;
    font-size:24px;
    animation:blink 1s infinite;
}

/* 휴대폰 */
#phoneScene{
    width:100%;
    height:100%;
    background:black;
    position:absolute;
    display:none;
    justify-content:center;
    align-items:center;
    z-index:70;
}

#phoneScene img{
    width:100%;
    height:100%;
    object-fit:contain;
}

/* 앱 */
#appScene{
    width:100%;
    height:100%;
    background:#f4f4f4;
    position:absolute;
    display:none;
    overflow:auto;
    z-index:80;
}

#header{
    width:100%;
    padding:30px;
    background:#ff8a00;
    color:white;
    font-size:42px;
    font-weight:bold;
}

#roomContainer{
    display:flex;
    gap:40px;
    padding:40px;
}

/* 매물 */
.roomCard{
    width:420px;
    background:white;
    border-radius:25px;
    overflow:hidden;
    box-shadow:0 10px 20px rgba(0,0,0,0.15);
    cursor:pointer;
    transition:0.3s;
}

.roomCard:hover{
    transform:translateY(-10px);
}

.roomImg{
    height:250px;
    background-size:cover;
    background-position:center;
}

.roomInfo{
    padding:25px;
}

.roomInfo h2{
    margin-bottom:15px;
}

.roomInfo p{
    margin:10px 0;
    font-size:20px;
}

/* 상세 */
#detailScene{
    width:100%;
    height:100%;
    background:#f5f5f5;
    position:absolute;
    z-index:200;
    display:none;
    overflow:auto;
    padding:40px;
}

.detailCard{
    max-width:1000px;
    margin:auto;
    background:white;
    border-radius:25px;
    padding:40px;
}

.detailCard h1{
    margin-bottom:20px;
}

.detailCard p{
    margin:15px 0;
    line-height:1.8;
    font-size:22px;
}

.backBtn{
    padding:15px 30px;
    border:none;
    border-radius:15px;
    background:black;
    color:white;
    font-size:20px;
    cursor:pointer;
    margin-bottom:20px;
}

.scheduleBtn{
    margin-top:30px;
    padding:20px 40px;
    border:none;
    border-radius:15px;
    background:#ff8a00;
    color:white;
    font-size:24px;
    cursor:pointer;
    margin-right:10px;
}

.contractPaper{
    margin-top:40px;
    padding:35px;
    border:2px solid #ddd;
    border-radius:20px;
    background:#fffef8;
}

/* 단어 설명 */
.term{
    color:#ff5c00;
    font-weight:bold;
    cursor:pointer;
    position:relative;
}

.term:hover::after{
    content:attr(data-tip);
    position:absolute;
    top:-80px;
    left:0;
    width:320px;
    background:black;
    color:white;
    padding:12px;
    border-radius:10px;
    font-size:16px;
    z-index:999;
}

/* 서명 */
.fakeSign{
    color:red;
    font-weight:bold;
    cursor:pointer;
    font-size:28px;
}

.signed{
    color:black;
    font-family:cursive;
    font-size:32px;
}

/* 엔딩 */
/* =========================
엔딩 화면 수정
기존 #endingScene, #endingText 부분 교체
========================= */

/* =========================
엔딩 화면 전체 교체
스크롤 없이 한 화면에 보이게
========================= */

/* =========================
엔딩 화면 완전 수정
진짜 화면 꽉 차게
========================= */

#endingScene{
    width:100vw;
    height:100vh;

    background:rgba(0,0,0,0.96);

    position:absolute;
    inset:0;

    display:none;

    justify-content:center;
    align-items:center;

    z-index:999;

    overflow:hidden;

    padding:10px;
}

#endingText{

    width:78vw;
    height:82vh;

    background:#111;

    border-radius:25px;

    padding:25px 35px;

    color:white;

    overflow:auto;

    display:flex;
    flex-direction:column;
    justify-content:flex-start;

    box-shadow:0 0 40px rgba(0,0,0,0.5);
}

/* 엔딩 이미지 */

.endingImage{
    width:100%;
    height:180px;

    object-fit:cover;

    border-radius:20px;

    margin-bottom:15px;
}

/* 엔딩 본문 */

.endingMain{
    font-size:22px;
    line-height:1.55;

    margin-bottom:15px;
}

/* 팁 부분 */

.endingTip{

    margin-top:10px;

    color:#ffd166;

    font-size:20px;

    line-height:1.5;

    display:grid;

    grid-template-columns:1fr 1fr;

    gap:10px 40px;
}

/* =========================
CSS 맨 아래 추가
========================= */

#thoughtBox{
    position:fixed;
    top:20px;
    right:20px;

    background:rgba(0,0,0,0.92);

    color:white;

    padding:20px;

    border-radius:18px;

    z-index:99999;

    width:340px;

    font-size:18px;

    line-height:1.5;

    display:none;

    box-shadow:0 0 20px rgba(0,0,0,0.4);
}

.askBtn{

    margin-top:15px;

    padding:10px 18px;

    border:none;

    border-radius:10px;

    background:#ff8a00;

    color:white;

    cursor:pointer;

    font-size:16px;
}

.suspicious,
.safe{

    color:#ff8a00;

    font-weight:bold;

    cursor:pointer;

    border-bottom:2px dotted #ff8a00;

}

.smallEndingBtn{

    padding:10px 18px;

    font-size:15px;

    border:none;

    border-radius:10px;

    background:#ff8a00;

    color:white;

    cursor:pointer;

    margin-right:10px;

    margin-top:15px;
}

</style>
</head>
<body>

</div>

</div>

추가/수정된 전체 SCRIPT 부분만 교체
기존 <script> ~ </script> 전체를 이걸로 바꿔
========================= -->

<div id="thoughtBox"></div>

<script>

const fireSound = document.getElementById("fireSound");
const walkSound = document.getElementById("walkSound");

const badMusic = document.getElementById("badMusic");
const goodMusic = document.getElementById("goodMusic");

/* =========================
불타는 소리 자연 반복
========================= */

fireSound.addEventListener("timeupdate", () => {

    if(fireSound.currentTime > fireSound.duration - 3){

        fireSound.currentTime = 0;
        fireSound.play();

    }

});

/* =========================
요소
========================= */

const startScene = document.getElementById("startScene");
const walkScene = document.getElementById("walkScene");
const fireScene = document.getElementById("fireScene");
const darkOverlay = document.getElementById("darkOverlay");

const dialogueBox = document.getElementById("dialogueBox");
const dialogueText = document.getElementById("dialogueText");

const phoneScene = document.getElementById("phoneScene");
const appScene = document.getElementById("appScene");

const detailScene = document.getElementById("detailScene");
const detailContent = document.getElementById("detailContent");

const endingScene = document.getElementById("endingScene");
const endingText = document.getElementById("endingText");


darkOverlay.style.display = "none";

/* =========================
대사
========================= */

const dialogues = [

"뭐야...? 우리 집이 불타고 있잖아?!",

"잠깐만... 지금 당장 잘 곳부터 구해야 해...",

"보증금도 얼마 없는데 어떡하지...?",

"일단 직방부터 켜보자..."

];

let current = 0;

/* =========================
서명 여부
========================= */

let signed = false;

/* =========================
게임 시작
========================= */

startScene.addEventListener("click", ()=>{

    startScene.style.display = "none";

    walkScene.style.display = "flex";

    /* 걷는 소리 */
    walkSound.volume = 0.9;
    walkSound.play();

    /* 멀리서 들리는 불소리 */
    fireSound.volume = 0.05;
    fireSound.play();

    setTimeout(()=>{

        walkScene.style.display = "none";

        walkSound.pause();

        /* 가까워지며 불소리 커짐 */
        fireSound.volume = 0.35;

        fireScene.style.opacity = "1";

        darkOverlay.style.display = "block";

        setTimeout(()=>{

            darkOverlay.style.opacity = "0";

        },100);

    },3000);

    setTimeout(()=>{

        dialogueBox.style.display = "block";

        dialogueText.innerText = dialogues[current];

    },6500);

});

/* =========================
대사 넘기기
========================= */

dialogueBox.addEventListener("click", ()=>{

    current++;

    if(current < dialogues.length){

        dialogueText.innerText = dialogues[current];

    }else{

        dialogueBox.style.display = "none";

        phoneScene.style.display = "flex";

        setTimeout(()=>{

            appScene.style.display = "block";

            /* 앱 들어가면 효과음 종료 */

            fireSound.pause();
            fireSound.currentTime = 0;

            walkSound.pause();
            walkSound.currentTime = 0;

            dialogueBox.style.display = "block";

            dialogueText.innerText =
            "매물이 두 개밖에 없네... 난 가진 돈도 얼마 없는데... 어떻게 해야 하지...?";

        },2500);

    }

});

/* =========================
앱 자유 탐색
========================= */

appScene.addEventListener("click", ()=>{

    dialogueBox.style.display = "none";

});

/* =========================
매물 열기
========================= */

function openRoom(type){

detailScene.style.display = "block";

if(type === 1){

detailContent.innerHTML = `

attachThoughtEvents();

안전 매물

}else{

const thoughtBox = document.getElementById("thoughtBox");

function attachThoughtEvents(){

    const targets = document.querySelectorAll(".suspicious, .safe");

    targets.forEach(target => {

        target.addEventListener("click", ()=>{

            thoughtBox.style.display = "block";

            thoughtBox.innerHTML = `

            <div style="margin-bottom:12px; line-height:1.6;">
            ${target.dataset.thought}
            </div>

            <button class="askBtn"
            onclick="askQuestion('${target.dataset.answer}')">
            물어보기
            </button>

            `;

        });



    });

}


function askQuestion(text){

    thoughtBox.innerHTML = `

    <div style="line-height:1.6;">
    "${text}"
    </div>

    <button class="askBtn"
    onclick="thoughtBox.style.display='none'">
    닫기
    </button>

    `;

}
